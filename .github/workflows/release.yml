name: release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish
        required: true
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.repository == 'Saevarl/kontra-pi'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref_name }}
      - uses: actions/setup-node@v6
        with:
          node-version: 22.19.0
          registry-url: https://registry.npmjs.org
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: npm install --global npm@11.18.0
      - run: python -m pip install "kontra>=0.13.0"
      - run: npm ci --ignore-scripts
      - name: Verify release tag
        run: node -e 'const version=require("./package.json").version; const tag=process.env.RELEASE_TAG; if (tag !== `v${version}`) throw new Error(`tag ${tag} does not match v${version}`)'
        env:
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
      - run: npm run check
        env:
          KONTRA_PYTHON: python
      - run: npm run smoke:package
        env:
          PYTHON: python
      # npm uses GitHub Actions OIDC here; trusted publishing adds provenance automatically.
      - run: npm publish --access public
