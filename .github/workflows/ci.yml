name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install "kontra>=0.13.0"
      - run: npm ci --ignore-scripts
      - run: npm run check
        env:
          KONTRA_PYTHON: python
      - run: npm pack --dry-run
