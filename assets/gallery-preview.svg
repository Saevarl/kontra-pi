<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">kontra-pi terminal preview</title>
  <desc id="desc">Kontra rule discovery and validation rendered natively inside Pi.</desc>
  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M30 0H0v30" fill="none" stroke="#6B82FF" stroke-opacity=".07"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#05060A" flood-opacity=".55"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="#0E1017"/>
  <rect width="1200" height="675" fill="url(#grid)"/>

  <g transform="translate(70 58) scale(.18)">
    <rect width="512" height="512" rx="112" fill="#2743F0"/>
    <path fill="#fff" fill-rule="evenodd" d="M96 88h224v144h-72v72h-72v72H96V88Zm80 72v72h72v-72h-72Z"/>
    <path fill="#fff" d="M320 232h96v144h-96z"/>
    <g fill="none" stroke-linecap="round" stroke-linejoin="round">
      <g stroke="#2743F0" stroke-width="54"><path d="M80 404h352"/><path d="M120 356 184 404 360 200"/></g>
      <g stroke="#AFC0FF" stroke-width="36"><path d="M80 404h352"/><path d="M80 372v64"/><path d="M432 372v64"/><path d="M120 356 184 404 360 200"/></g>
    </g>
    <circle cx="360" cy="200" r="26" fill="#fff"/>
  </g>

  <text x="184" y="104" fill="#F4F5F8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="42" font-weight="700" letter-spacing="-2">kontra-pi</text>
  <text x="70" y="205" fill="#F4F5F8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="48" font-weight="700" letter-spacing="-1.5">Data quality, native to Pi.</text>
  <text x="72" y="250" fill="#969DAF" font-family="ui-sans-serif, system-ui, sans-serif" font-size="23">Exact rules. Local execution. No server.</text>

  <g transform="translate(70 300)" filter="url(#shadow)">
    <rect width="1060" height="310" rx="18" fill="#151822" stroke="#2B3040" stroke-width="2"/>
    <circle cx="28" cy="28" r="6" fill="#FF6B6B"/><circle cx="49" cy="28" r="6" fill="#FFD166"/><circle cx="70" cy="28" r="6" fill="#63D297"/>
    <text x="96" y="36" fill="#697084" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">pi · warehouse</text>
    <path d="M0 56h1060" stroke="#262B38"/>

    <text x="30" y="94" fill="#F4F5F8" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="19">&gt; write and validate the users contract</text>
    <text x="30" y="137" fill="#8296FF" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">kontra rules unique</text>
    <text x="30" y="170" fill="#AFC0FF" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">◆ unique · column</text>
    <text x="30" y="213" fill="#8296FF" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">kontra validate contracts/users.yml</text>
    <text x="30" y="246" fill="#63D297" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">✓ 4/4 passed · 100,000 rows</text>
    <text x="30" y="282" fill="#697084" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">metadata · postgres</text>
  </g>
</svg>
