<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">kontra-pi running inside Pi</title>
  <desc id="desc">Pi profiles a PostgreSQL table, inspects Kontra's unique rule, and validates a contract.</desc>

  <rect width="1200" height="675" fill="#262626"/>

  <!-- Terminal title bar, retained because the gallery image is an honest Pi session. -->
  <rect width="1200" height="78" fill="#292929"/>
  <line x1="0" y1="77.5" x2="1200" y2="77.5" stroke="#202020"/>
  <circle cx="18" cy="23" r="7" fill="#ee695f"/>
  <circle cx="43" cy="23" r="7" fill="#f5bd4f"/>
  <circle cx="68" cy="23" r="7" fill="#61c454"/>

  <g font-family="Berkeley Mono, JetBrains Mono, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
    <text x="102" y="30" fill="#938e7c" font-size="16" font-weight="700">⌥⌘3</text>
    <text x="600" y="30" fill="#aaa38a" font-size="17" font-weight="700" text-anchor="middle">π - kontra-pi-test</text>

    <!-- User prompt -->
    <rect x="0" y="78" width="1200" height="63" fill="#353540"/>
    <text x="10" y="110" fill="#d8d8da" font-size="14.5" letter-spacing=".35">Profile pg.events_large. Inspect unique's exact semantics. Validate contracts/postgres-events-large.yml. Keep it brief.</text>

    <!-- Native kontra-pi tool calls -->
    <rect x="0" y="161" width="1200" height="84" fill="#223126"/>
    <text x="10" y="193" fill="#d7d7d7" font-size="15.5" font-weight="700">kontra</text>
    <text x="73" y="193" fill="#8bc9c5" font-size="15.5">profile</text>
    <text x="143" y="193" fill="#929292" font-size="15.5">pg.events_large</text>
    <text x="10" y="214" fill="#8bc9c5" font-size="15.5">◆</text>
    <text x="29" y="214" fill="#eee3bd" font-size="15.5">~100.000 rows × 5 columns · scan</text>
    <text x="345" y="214" fill="#696b69" font-size="15.5">569.4ms</text>

    <rect x="0" y="264" width="1200" height="84" fill="#223126"/>
    <text x="10" y="296" fill="#d7d7d7" font-size="15.5" font-weight="700">kontra</text>
    <text x="73" y="296" fill="#8bc9c5" font-size="15.5">rules</text>
    <text x="124" y="296" fill="#929292" font-size="15.5">unique</text>
    <text x="10" y="317" fill="#8bc9c5" font-size="15.5">◆</text>
    <text x="29" y="317" fill="#eee3bd" font-size="15.5">unique · column</text>
    <text x="180" y="317" fill="#696b69" font-size="15.5">35.4ms</text>

    <rect x="0" y="367" width="1200" height="84" fill="#223126"/>
    <text x="10" y="399" fill="#d7d7d7" font-size="15.5" font-weight="700">kontra</text>
    <text x="73" y="399" fill="#8bc9c5" font-size="15.5">validate</text>
    <text x="151" y="399" fill="#929292" font-size="15.5">contracts/postgres-events-large.yml</text>
    <text x="10" y="420" fill="#cbd56f" font-size="15.5">✓</text>
    <text x="29" y="420" fill="#eee3bd" font-size="15.5">8/8 passed · 100.000 rows</text>
    <text x="285" y="420" fill="#696b69" font-size="15.5">281.8ms</text>

    <!-- Pi's concise response -->
    <text x="10" y="486" fill="#eee3bd" font-size="14.5">- pg.events_large: ~100,000 rows; event_id/occurred_at ~100% distinct; amount ~74.6% NULL.</text>
    <text x="10" y="508" fill="#eee3bd" font-size="14.5">- unique: ignores NULLs; each duplicate group contributes N−1 violations.</text>
    <text x="10" y="530" fill="#eee3bd" font-size="14.5">- Contract: PASSED — 8 rules.</text>

    <!-- Pi input and status area -->
    <line x1="0" y1="565" x2="1200" y2="565" stroke="#d29bd6" stroke-width="1"/>
    <rect x="0" y="573" width="9" height="17" fill="#eee3bd"/>
    <line x1="0" y1="608" x2="1200" y2="608" stroke="#d29bd6" stroke-width="1"/>
    <text x="0" y="635" fill="#666666" font-size="14">~/Documents/Sævar/kontra-pi-test (main)</text>
    <text x="0" y="657" fill="#666666" font-size="13.5">↑12k ↓820 R39k CH90.9% $0.021 (sub) 1.4%/372k (auto)</text>
    <text x="1190" y="657" fill="#666666" font-size="13.5" text-anchor="end">(openai-codex) gpt-5.6-luna · high</text>
  </g>
</svg>
